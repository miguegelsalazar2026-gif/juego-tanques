<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Tanques</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #f0f0f0; overflow: hidden; font-family: sans-serif; }
        #ui { position: absolute; top: 15px; left: 15px; color: #333; font-size: 20px; font-weight: bold; pointer-events: none; }
        #btnReinicio { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; font-size: 20px; cursor: pointer; display: none; }
    </style>
</head>
<body>
    <div id="ui">BAJAS: <span id="score">0</span></div>
    <button id="btnReinicio" onclick="location.reload()">REINICIAR JUEGO</button>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        // Sonidos
        const sndDisparo = new Audio('MP3/DISPAROS.mp3');
        const sndExplosion = new Audio('MP3/sonido explosion.mp3');
        const sndMusica = new Audio('MP3/SOY LEYENDA _ BANDA SONORA (SOUNDTRACK).mp3');

        let score = 0, gameOver = false;
        const player = { x: canvas.width/2 - 25, y: canvas.height - 150, w: 50, h: 60 };
        const enemies = [], bullets = [];

        // Iniciar música
        sndMusica.loop = true;
        sndMusica.play();

        function dibujarTanque(x, y, color) {
            ctx.fillStyle = color; 
            ctx.fillRect(x + 10, y, 30, 60); // Cuerpo
            ctx.fillStyle = '#333'; 
            ctx.fillRect(x, y + 5, 10, 50); // Oruga izq
            ctx.fillRect(x + 40, y + 5, 10, 50); // Oruga der
            ctx.fillStyle = color; 
            ctx.fillRect(x + 22, y - 10, 6, 15); // Cañón
        }

        window.addEventListener('touchmove', (e) => {
            player.x = e.touches[0].clientX - player.w/2;
            player.y = e.touches[0].clientY - player.h/2;
        });

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (gameOver) {
                document.getElementById('btnReinicio').style.display = 'block';
                return;
            }

            // Jugador
            dibujarTanque(player.x, player.y, '#000');

            // Balas
            bullets.forEach((b, i) => {
                b.y -= 10;
                ctx.fillStyle = '#00f'; ctx.fillRect(b.x, b.y, 6, 15);
                if (b.y < 0) bullets.splice(i, 1);
            });

            // Enemigos
            if (Math.random() < 0.03) enemies.push({x: Math.random()*(canvas.width-40), y: -50});
            enemies.forEach((e, i) => {
                e.y += 3;
                dibujarTanque(e.x, e.y, '#f00'); // Enemigos con forma de tanque
                bullets.forEach((b, j) => {
                    if (b.x < e.x + 50 && b.x + 6 > e.x && b.y < e.y + 60 && b.y + 15 > e.y) {
                        enemies.splice(i, 1); bullets.splice(j, 1); score++;
                        document.getElementById('score').innerText = score;
                        sndExplosion.play();
                    }
                });
                if (e.y > canvas.height) gameOver = true;
            });

            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>

                    ctx.save();

    </script>
</body>
</html>
