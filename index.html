<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tanques: La Odisea</title>
    <style>
        body { margin: 0; overflow: hidden; background: #f0f0f0; font-family: sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; font-weight: bold; text-shadow: 1px 1px 2px black; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">BAJAS: <span id="score">0</span> | NIVEL: <span id="lvl">1</span></div>
    <canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;

let score = 0, nivel = 1, superModo = false, escudo = false, gameOver = false;
const player = { x: canvas.width/2 - 25, y: canvas.height - 100 };
const enemies = [], bricks = [], bullets = [], boss = {x: 100, y: 50, vida: 200, active: false};

// Fondo según nivel
function drawBackground() {
    if (nivel === 1) ctx.fillStyle = '#f0f0f0';
    else if (nivel === 2) ctx.fillStyle = '#555'; // Carrera
    else ctx.fillStyle = '#1a1a2e'; // Ciudad
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function update() {
    if (gameOver) return;
    drawBackground();
    
    // Nivel 1: Tanques (50)
    if (nivel === 1) {
        if (Math.random() < 0.03) enemies.push({x: Math.random()*(canvas.width-40), y: -50});
        enemies.forEach((e, i) => {
            e.y += 3;
            ctx.fillStyle = 'red'; ctx.fillRect(e.x, e.y, 40, 40);
            bullets.forEach((b, j) => {
                if (b.x > e.x && b.x < e.x+40 && b.y < e.y+40) {
                    enemies.splice(i, 1); bullets.splice(j, 1); score++;
                    if (score >= 50) nivel = 2;
                }
            });
        });
    }

    // Nivel 2: Muro de Ladrillos (30 líneas)
    if (nivel === 2) {
        if (bricks.length === 0) for(let i=0; i<30; i++) bricks.push({x: (i%10)*40, y: Math.floor(i/10)*40});
        bricks.forEach((br, i) => {
            ctx.fillStyle = 'brown'; ctx.fillRect(br.x, br.y, 35, 35);
            bullets.forEach((b, j) => {
                if (b.x > br.x && b.x < br.x+35 && b.y < br.y+35) {
                    bricks.splice(i, 1); bullets.splice(j, 1);
                    if (bricks.length === 0) nivel = 3;
                }
            });
        });
        superModo = true; // Doble cañón permanente en nivel 2
    }

    // Nivel 3: Nave Espacial
    if (nivel === 3) {
        boss.active = true;
        boss.x += Math.sin(Date.now() * 0.005) * 5;
        ctx.fillStyle = 'cyan'; ctx.fillRect(boss.x, boss.y, 100, 50);
        bullets.forEach((b, j) => {
            if (b.x > boss.x && b.x < boss.x+100 && b.y < boss.y+50) {
                boss.vida--; bullets.splice(j, 1);
                if (boss.vida <= 0) alert("¡VICTORIA!");
            }
        });
    }

    // Jugador
    ctx.fillStyle = escudo ? 'green' : 'black';
    ctx.fillRect(player.x, player.y, 50, 50);
    if (superModo) { ctx.fillRect(player.x-10, player.y, 10, 30); ctx.fillRect(player.x+50, player.y, 10, 30); }

    // Balas
    bullets.forEach((b, i) => { b.y -= 10; ctx.fillStyle = 'blue'; ctx.fillRect(b.x, b.y, 5, 10); if(b.y < 0) bullets.splice(i,1); });

    requestAnimationFrame(update);
}

window.addEventListener('touchmove', (e) => player.x = e.touches[0].clientX - 25);
setInterval(() => {
    bullets.push({x: player.x+22, y: player.y});
    if (superModo) { bullets.push({x: player.x-10, y: player.y}); bullets.push({x: player.x+60, y: player.y}); }
}, 300);

update();
</script>
</body>
</html>
