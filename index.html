<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon City Pursuit</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; color: #00f0ff; font-family: monospace; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">PUNTOS: <span id="score">0</span></div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let speed = 5;
        let roadOffset = 0;
        
        const player = { x: canvas.width/2, y: canvas.height - 100, w: 40, h: 60 };
        const enemies = [];

        window.addEventListener('pointermove', (e) => { player.x = e.clientX - 20; });

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. Dibujar Autopista móvil
            roadOffset += speed;
            if (roadOffset > 40) roadOffset = 0;
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 10;
            for(let i=0; i < canvas.height/40 + 1; i++) {
                ctx.beginPath();
                ctx.moveTo(canvas.width/2, i * 40 + roadOffset - 40);
                ctx.lineTo(canvas.width/2, i * 40 + roadOffset - 20);
                ctx.stroke();
            }

            // 2. Dibujar Tanque Jugador
            ctx.fillStyle = '#00f0ff';
            ctx.fillRect(player.x, player.y, player.w, player.h);

            // 3. Generar y mover enemigos (Edificios/Obstáculos)
            if(Math.random() < 0.05) {
                enemies.push({ x: Math.random() * (canvas.width - 50), y: -50, w: 50, h: 50 });
            }

            for(let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].y += speed;
                ctx.fillStyle = '#ff0055';
                ctx.fillRect(enemies[i].x, enemies[i].y, enemies[i].w, enemies[i].h);
                
                if(enemies[i].y > canvas.height) {
                    enemies.splice(i, 1);
                    score += 10;
                    document.getElementById('score').innerText = score;
                }
            }
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
