<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Tanques PRO</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #f0f0f0; overflow: hidden; font-family: sans-serif; }
        #ui { position: absolute; top: 15px; left: 15px; color: #333; font-size: 20px; font-weight: bold; pointer-events: none; }
        #btnMute { position: absolute; top: 15px; right: 15px; padding: 10px; cursor: pointer; z-index: 10; background: #333; color: white; border: none; border-radius: 5px; }
        #btnReinicio { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; font-size: 20px; cursor: pointer; display: none; }
    </style>
</head>
<body>
    <div id="ui">BAJAS: <span id="score">0</span></div>
    <button id="btnMute" onclick="toggleMute()">🔇 SONIDO</button>
    <button id="btnReinicio" onclick="location.reload()">REINICIAR JUEGO</button>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        const sndDisparo = new Audio('MP3/DISPAROS.mp3');
        const sndExplosion = new Audio('MP3/sonido explosion.mp3');
        const sndMusica = new Audio('MP3/SOY LEYENDA _ BANDA SONORA (SOUNDTRACK).mp3');

        let score = 0, gameOver = false, muted = false, powerUp = false;
        let velEnemigos = 3;
        const player = { x: canvas.width/2 - 25, y: canvas.height - 150, w: 50, h: 60 };
        const enemies = [], bullets = [], particles = [], items = [];

        function toggleMute() {
            muted = !muted;
            sndDisparo.muted = muted; sndExplosion.muted = muted; sndMusica.muted = muted;
            document.getElementById('btnMute').innerText = muted ? '🔊 MUTED' : '🔇 SONIDO';
        }

        sndMusica.loop = true; sndMusica.play();

        function spawnParticles(x, y) {
            for(let i=0; i<6; i++) particles.push({x, y, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10, life: 20});
        }

        function dibujarTanque(x, y, color) {
            ctx.fillStyle = color; ctx.fillRect(x + 10, y, 30, 60);
            ctx.fillStyle = '#333'; ctx.fillRect(x, y + 5, 10, 50); ctx.fillRect(x + 40, y + 5, 10, 50);
            ctx.fillStyle = color; ctx.fillRect(x + 22, y - 10, 6, 15);
        }

        window.addEventListener('touchmove', (e) => {
            player.x = e.touches[0].clientX - player.w/2;
            player.y = e.touches[0].clientY - player.h/2;
        });

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (gameOver) { document.getElementById('btnReinicio').style.display = 'block'; return; }

            dibujarTanque(player.x, player.y, '#000');

            if (powerUp) { ctx.strokeStyle = '#0f0'; ctx.strokeRect(player.x-5, player.y-5, 60, 70); }

            bullets.forEach((b, i) => {
                b.y -= 10;
                ctx.fillStyle = b.triple ? '#0f0' : '#00f'; ctx.fillRect(b.x, b.y, 6, 15);
                if (b.y < 0) bullets.splice(i, 1);
            });

            if (Math.random() < 0.03) enemies.push({x: Math.random()*(canvas.width-40), y: -50});
            enemies.forEach((e, i) => {
                e.y += velEnemigos;
                dibujarTanque(e.x, e.y, '#f00');
                bullets.forEach((b, j) => {
                    if (b.x < e.x + 50 && b.x + 6 > e.x && b.y < e.y + 60 && b.y + 15 > e.y) {
                        spawnParticles(e.x, e.y);
                        enemies.splice(i, 1); bullets.splice(j, 1); score++;
                        if (score % 20 === 0) velEnemigos += 0.5;
                        if (score % 15 === 0) items.push({x: e.x, y: e.y});
                        document.getElementById('score').innerText = score;
                        sndExplosion.play();
                    }
                });
                if (e.x < player.x + 50 && e.x + 50 > player.x && e.y < player.y + 60 && e.y + 60 > player.y) gameOver = true;
                if (e.y > canvas.height) enemies.splice(i, 1);
            });

            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life--;
                ctx.fillStyle = '#f00'; ctx.fillRect(p.x, p.y, 4, 4);
                if (p.life <= 0) particles.splice(i, 1);
            });

            items.forEach((it, i) => {
                it.y += 2;
                ctx.fillStyle = '#0f0'; ctx.fillRect(it.x, it.y, 20, 20);
                if (it.x < player.x + 50 && it.x + 20 > player.x && it.y < player.y + 60 && it.y + 20 > player.y) {
                    powerUp = true; items.splice(i, 1); setTimeout(() => powerUp = false, 7000);
                }
            });
            requestAnimationFrame(update);
        }
        
        setInterval(() => {
            if(!gameOver) {
                let offset = powerUp ? 20 : 0;
                bullets.push({x: player.x + 22 - offset, y: player.y, triple: powerUp});
                if(powerUp) {
                    bullets.push({x: player.x + 22, y: player.y, triple: powerUp});
                    bullets.push({x: player.x + 22 + offset, y: player.y, triple: powerUp});
                }
                sndDisparo.play();
            }
        }, 500);

        update();
    </script>
</body>
</html>
    </script>
</body>
</html>
